#!/usr/bin/env python3
PACKAGE = "rover_control"

from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()
gen.add("kp", double_t, 0, "Proportional gain", 0.5, 0.0, 10.0)
gen.add("ki", double_t, 0, "Integral gain", 0.0, 0.0, 10.0)
gen.add("kd", double_t, 0, "Derivative gain", 0.0, 0.0, 10.0)
gen.add("max_pwm", int_t, 0, "Max PWM", 200, 0, 255)

exit(gen.generate(PACKAGE, "rover_control", "WheelPID"))
